# ============================================
# MedNear AI - Docker Compose
# ============================================

version: "3.9"

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mednear-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mednear-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:16-alpine
    container_name: mednear-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-mednear_ai}
      POSTGRES_USER: ${DB_USER:-mednear_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mednear_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-mednear_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mednear-network

  redis:
    image: redis:7-alpine
    container_name: mednear-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-mednear_redis_pass}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-mednear_redis_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mednear-network

  prometheus:
    image: prom/prometheus:latest
    container_name: mednear-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - mednear-network

  grafana:
    image: grafana/grafana:latest
    container_name: mednear-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - mednear-network

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  mednear-network:
    driver: bridge